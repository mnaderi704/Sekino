<!DOCTYPE html><html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sekino</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000000;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:tahoma;

overflow:hidden;

}

.container{

width:100%;

display:flex;
flex-direction:column;
align-items:center;

}

.logo{
width:320px;
max-width:85%;

margin-top:120px;

margin-bottom:60px;
}

.percent{

color:#f5c84c;

font-size:18px;

font-weight:bold;

margin-bottom:25px;

}

.progress-box{

width:70%;

max-width:700px;

height:16px;

border:2px solid #f5c84c;

border-radius:50px;

overflow:hidden;

box-shadow:
0 0 8px #f5c84c,
0 0 15px #f5c84c;

}

.progress{

width:0%;

height:100%;

border-radius:50px;

background:linear-gradient(
90deg,
#ffd84d,
#ffbf00
);

box-shadow:
0 0 10px #ffd84d,
0 0 20px #ffd84d;

}

.loading{

margin-top:70px;

color:#f5c84c;

font-size:24px;

}

</style>
<link rel="icon" type="image/png" href="icon-512.png">
</head>
<body>
  <div class="container"><img
src="logo.png"
class="logo"
alt="Sekino">

<div
id="percent"
class="percent">
0%
</div><div class="progress-box"><div
id="progress"
class="progress">
</div></div><div class="loading">
در حال آماده‌سازی سکینو...
</div>
</div>
<script>
let percent = 0;

let timer = setInterval(function(){

percent++;

document.getElementById(
    "percent"
).innerText =
percent + "%";

document.getElementById(
    "progress"
).style.width =
percent + "%";

if(percent >= 100){

    clearInterval(timer);

    setTimeout(function(){

        window.location.replace(
            "home.html"
        );

    },300);

}

},50);

</script>
</body>
</html>
